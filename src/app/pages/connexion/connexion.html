<div class="login-container">

  <h2>Connexion</h2>

  <form (ngSubmit)="onLogin()">

    <!-- Email -->
    
      <label>Email</label>
      <input 
        type="email" 
        [(ngModel)]="email" 
        name="email" 
        required>
    

    <!-- Password -->
    
      <label>Mot de passe</label>
      <input 
        type="password" 
        [(ngModel)]="password" 
        name="password" 
        required>
    

    <!-- Bouton -->
    <button type="submit">
      Se connecter
    </button>

  </form>
<a routerLink="/inscription">Inscription</a>
