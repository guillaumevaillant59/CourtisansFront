<div class="login-container">

  <h2>Connexion</h2>

  <form (ngSubmit)="onLogin()">

    <!-- Email -->
    <div>
      <label>Email</label>
      <input 
        type="email" 
        [(ngModel)]="email" 
        name="email" 
        required>
    </div>

    <!-- Password -->
    <div>
      <label>Mot de passe</label>
      <input 
        type="password" 
        [(ngModel)]="password" 
        name="password" 
        required>
    </div>

    <!-- Bouton -->
    <button type="submit">
      Se connecter
    </button>

  </form>

</div>
